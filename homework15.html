<html>
    <head>
        <title>Java script</title>
    </head>
    <body>
        <button class="button" onclick="yo(2)">click me</button>
        <script>
            function yo(x,y){
                if(y==undefined){
                    var y=3
                }
                document.write(x*y)
            }
        </script>
    </body>
</html>
