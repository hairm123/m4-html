<html>
    <head><title>Java functions</title></head>
    <body>
        <button onclick="my(5)">Click me</button>
        <script>
            function my(x,y){
                if(y==undefined){
                    var y=2
                }
                var c=x*y
                document.write(c)
            }
        </script>
    </body>
</html>
