<html>
    <body>
        <p id="p1"></p>
        <p id="p2"></p>
        <p id="p3"></p>
        <script>
            var fruits=["apple","banana","orange","mango"]
            document.getElementById("p1").innerHTML=fruits.join("*")
            document.getElementById("p2").innerHTML=fruits
            document.getElementById("p3").innerHTML=fruits.pop()
        </script>
    </body>
</html>
