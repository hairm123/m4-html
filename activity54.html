<html>
    <body>
        <p id="result"></p>
        <script>
            function findmax(){
                var i;
                var max=arguments[1];
                for(i=0;i<arguments.length;i++){
                    if(arguments[i]<max){
                        var max=arguments[i];
                    }
                }
                return(max)
            }
            document.getElementById("result").innerHTML=findmax(4,3,5);
        </script>
    </body>
</html>
