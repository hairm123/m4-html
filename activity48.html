<html>
    <body>
        <button type="button" onclick="my()">Click me</button>
        <p id="d1"></p>
        <p id="d2"></p>
        <p id="d3"></p>
        <script>
            var a=5;
            function my(){
                var b=2;
                var c=a*b;
                document.getElementById("d1").innerHTML=c;
            }
            document.getElementById("d2").innerHTML=a;
            document.getElementById("d3").innerHTML=b;
        </script>
    </body>
</html>
