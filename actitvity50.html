<html>
    <body>
        <h2>Java script loops</h2>
        <p id="demo"></p>
        <script>
            var fruit="a1,a2,a3,a4,a5"
            var out=""
            var i;
            for (i=0;i<fruit.length;i++){
                out+=fruit[i] + "<br>";
            }
            document.getElementById("demo").innerHTML=out;

        </script>
    </body>
</html>
