<html>
    <body>  
        <button type="button" onclick="ascending()">Ascending Order</button>
        <button type="button" onclick="decending()">Decending Order</button>
        <p id="result"></p>
        <script>
            var points=[40,100,1,5,25,10];
            document.getElementById("result").innerHTML=points;
            function ascending(){
                points.sort(function(a,b){return a-b});
                document.getElementById("result").innerHTML = points;
            }
            function decending(){
                points.sort(function(a,b){return b-a});
                document.getElementById("result").innerHTML = points;
            }
        </script>
    </body>
</html>
