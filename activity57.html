<html>
    <body>
        <p id="res"></p>
        <script>
            function add(a,b){
                var c=a+b
                return(c)
            }
            function average(a,b){
                var d=add(a,b)/2
                return(d)
            }
            document.getElementById("res").innerHTML=average(10,20);
        </script>
    </body>
</html>
